# Explicit single-crate Cargo workspace: the [workspace] block makes
# this manifest a workspace root with the local [package] as its only
# member. target/ lives at this directory (the workspace root). Matches
# what users get when they `cargo new` and later add a [workspace]
# declaration — a valid and common layout that @wdio/dioxus-service
# must support alongside the workspace-with-subdir-member shape used by
# the Tauri fixtures.
[workspace]
resolver = "2"

[package]
name = "wdio-dioxus-e2e-app"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "wdio-dioxus-e2e-app"
path = "src/main.rs"

[dependencies]
dioxus = { version = "0.7", features = ["desktop"] }
wdio-dioxus-embedded-driver = { git = "https://github.com/webdriverio/desktop-mobile.git", rev = "817a24eacc1009be26a634a1edb7f52add08c90b" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Temporary patch until upstream Dioxus releases the matching API.
# Exposes Config::with_background_throttling so main.rs can disable
# WKWebView WebContent suspension under automation (see main.rs for the
# call site and the rationale). Tracking upstream PR:
#   https://github.com/DioxusLabs/dioxus/pull/5587
# Drop the [patch] block once the published dioxus-desktop version
# contains the change.
#
# Pinned by `rev` (not `branch`) so CI builds are reproducible — a
# force-push on the fork branch can't silently change what we compile
# against. Update the rev when cherry-picking new upstream fixes onto
# the v0.7.9 line.
#
# We have to patch the whole dioxus family (not just dioxus-desktop)
# because the meta `dioxus` crate from crates.io brings its own copy of
# dioxus-core, and Cargo treats `dioxus-core` from crates.io as different
# from `dioxus-core` referenced from the patched git workspace (even at
# the same version). Patching the whole family forces a single workspace
# resolution so the type identities line up.
[patch.crates-io]
dioxus = { git = "https://github.com/goosewobbler/dioxus.git", rev = "c03c394d3213fd8fdf28fa4fda380725e5148d36" }
dioxus-core = { git = "https://github.com/goosewobbler/dioxus.git", rev = "c03c394d3213fd8fdf28fa4fda380725e5148d36" }
dioxus-desktop = { git = "https://github.com/goosewobbler/dioxus.git", rev = "c03c394d3213fd8fdf28fa4fda380725e5148d36" }
