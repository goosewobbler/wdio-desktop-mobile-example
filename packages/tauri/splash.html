<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splash Screen</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        overflow: hidden;
      }

      .container {
        text-align: center;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        font-weight: 300;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 1rem auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status {
        margin-top: 1rem;
        font-size: 0.9rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 WDIO Tauri Test App</h1>
      <div class="spinner"></div>
      <div class="status">Loading... (Splash Screen)</div>
    </div>

    <script type="module">
      console.log('[Splash] Splash screen loaded');
      
      // Import WDIO Tauri plugin for splash screen support
      import('@wdio/tauri-plugin').then(() => {
        console.log('[Splash] WDIO Tauri plugin loaded on splash screen');
      }).catch((e) => {
        console.warn('[Splash] WDIO Tauri plugin not available:', e);
      });
    </script>
  </body>
</html>
