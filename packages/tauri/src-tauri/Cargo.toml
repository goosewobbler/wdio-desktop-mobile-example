[package]
name = "wdio-desktop-mobile-example-tauri"
version = "1.0.0"
description = "Tauri test app for wdio-desktop-mobile-example"
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2.6", features = [] }

[dependencies]
tauri = { version = "2.11", features = [] }
tauri-plugin-deep-link = "2.4"
tauri-plugin-wdio = "1.0.0"
tauri-plugin-wdio-webdriver = "1.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
once_cell = "1"
sysinfo = "0.30"
clipboard = "0.5"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2"

[target.'cfg(target_os = "macos")'.dependencies]
tauri-plugin-automation = "0.1"
