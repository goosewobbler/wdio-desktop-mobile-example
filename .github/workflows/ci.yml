name: CI

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:

jobs:
  # Electron CJS Tests
  electron-cjs:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - name: 🔧 Apply Linux Kernel Workaround
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: sudo sysctl -q -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - name: Run Electron CJS tests
        run: pnpm run test:electron-cjs
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/electron-cjs run ci:logs

  # Electron ESM Tests
  electron-esm:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - name: 🔧 Apply Linux Kernel Workaround
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: sudo sysctl -q -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - name: Run Electron ESM tests
        run: pnpm run test:electron-esm
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/electron-esm run ci:logs

  # Tauri Tests with Embedded Driver (all platforms)
  tauri-embedded:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri
      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsoup-3.0-dev libssl-dev libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev xvfb
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - name: Run Tauri embedded tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          NO_AT_BRIDGE: '1'
          RUST_BACKTRACE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x16" pnpm run test:tauri:embedded
      - name: Run Tauri embedded tests
        if: ${{ runner.os != 'Linux' }}
        env:
          RUST_BACKTRACE: '1'
        run: pnpm run test:tauri:embedded
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/tauri run ci:logs

  # Tauri Tests with Official Driver (Linux/Windows only)
  tauri-official:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x]
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri
      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsoup-3.0-dev libssl-dev libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev xvfb
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - name: Run Tauri official tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          NO_AT_BRIDGE: '1'
          RUST_BACKTRACE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x16" pnpm run test:tauri:official
      - name: Run Tauri official tests
        if: ${{ runner.os == 'Windows' }}
        env:
          RUST_BACKTRACE: '1'
        run: pnpm run test:tauri:official
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/tauri run ci:logs

  # Tauri Tests with CrabNebula Driver (all platforms, requires API key for macOS)
  tauri-crabnebula:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri
      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsoup-3.0-dev libssl-dev libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev xvfb
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: true
      - name: Run Tauri CrabNebula tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          NO_AT_BRIDGE: '1'
          RUST_BACKTRACE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x16" pnpm run test:tauri:crabnebula
      - name: Run Tauri CrabNebula tests
        if: ${{ runner.os != 'Linux' }}
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          RUST_BACKTRACE: '1'
        run: pnpm run test:tauri:crabnebula
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/tauri run ci:logs
