name: CI

# Stable caller: tests against the `default` catalog (latest published releases).
# On push/PR the committed lockfile is used; the nightly schedule re-resolves the
# floating `latest`/caret specifiers as a canary for newly-published stable deps.
on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/_ci.reusable.yml
    with:
      catalog: default
    secrets: inherit
