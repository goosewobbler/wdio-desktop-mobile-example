name: CI (reusable)

# Shared test matrix for every catalog. Thin callers (ci.yml, ci-next.yml,
# ci-minimum.yml) invoke this with a `catalog` input; the install block below
# resolves dependencies for that catalog. See scripts/switch-catalog.ts.
on:
  workflow_call:
    inputs:
      catalog:
        description: 'pnpm catalog to test against (default | next | minimum)'
        type: string
        default: default

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Electron — three packages × test types
  # ────────────────────────────────────────────────────────────────────
  electron:
    name: electron-${{ matrix.package }}-${{ matrix.test-type }} (${{ matrix.os }}, ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
        package: [builder, forge, script]
        test-type: [standard, multiremote, deeplink, standalone, window, visual, video]
        exclude:
          # The electron-script app has no testapp:// protocol handler — upstream
          # only wires deeplinks into the builder + forge fixtures.
          - { package: script, test-type: deeplink }
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - name: 🔧 Apply Linux Kernel Workaround
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: sudo sysctl -q -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      # Linux deeplink tests need the testapp:// protocol registered with
      # xdg-mime, which requires the packaged binary to exist on disk first.
      # macOS auto-registers from app.setAsDefaultProtocolClient at launch.
      - name: Build app for deeplink protocol registration (Linux)
        if: ${{ matrix.test-type == 'deeplink' && runner.os == 'Linux' }}
        run: pnpm --filter=@wdio-desktop-mobile-example/electron-${{ matrix.package }} run build
      - name: Register testapp:// protocol handler (Linux)
        if: ${{ matrix.test-type == 'deeplink' && runner.os == 'Linux' }}
        run: bash packages/electron-${{ matrix.package }}/scripts/protocol-install.sh
      - name: Run Electron tests
        run: pnpm run test:electron-${{ matrix.package }}:${{ matrix.test-type }}
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/electron-${{ matrix.package }} run ci:logs

  # ────────────────────────────────────────────────────────────────────
  # Dioxus — all OS × test types (single embedded provider)
  # ────────────────────────────────────────────────────────────────────
  dioxus:
    name: dioxus-${{ matrix.test-type }} (${{ matrix.os }}, ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
        test-type: [standard, multiremote, standalone, window, visual, video]
        # No deeplink: the Dioxus fixture does not register the testapp://
        # protocol handler. Add a deeplink cell once the fixture supports it.
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dioxus
      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            xvfb
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      - name: Run Dioxus tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          NO_AT_BRIDGE: '1'
          RUST_BACKTRACE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x16" pnpm run test:dioxus:${{ matrix.test-type }}
      - name: Run Dioxus tests
        if: ${{ runner.os != 'Linux' }}
        env:
          RUST_BACKTRACE: '1'
        run: pnpm run test:dioxus:${{ matrix.test-type }}
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/dioxus run ci:logs

  # ────────────────────────────────────────────────────────────────────
  # Tauri Embedded — all OS × test types
  # ────────────────────────────────────────────────────────────────────
  tauri-embedded:
    name: tauri-embedded-${{ matrix.test-type }} (${{ matrix.os }}, ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
        test-type: [standard, multiremote, deeplink, standalone, window, visual, video]
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri
      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsoup-3.0-dev libssl-dev libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev xvfb
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      - name: Run Tauri embedded tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          NO_AT_BRIDGE: '1'
          RUST_BACKTRACE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x16" pnpm run test:tauri:embedded:${{ matrix.test-type }}
      - name: Run Tauri embedded tests
        if: ${{ runner.os != 'Linux' }}
        env:
          RUST_BACKTRACE: '1'
        run: pnpm run test:tauri:embedded:${{ matrix.test-type }}
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/tauri run ci:logs

  # ────────────────────────────────────────────────────────────────────
  # Tauri Official — Linux/Windows only × test types
  # ────────────────────────────────────────────────────────────────────
  tauri-official:
    name: tauri-official-${{ matrix.test-type }} (${{ matrix.os }}, ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x]
        test-type: [standard, multiremote, deeplink, standalone, window, visual, video]
        exclude:
          # On Linux+official (tauri-driver + WebKitGTK), @wdio/visual-service's
          # before() hook calls browser.execute('return window.devicePixelRatio'),
          # which gets wrapped by @wdio/tauri-service's patchedExecute into an
          # executeAsync HTTP call. That call hangs and times out after ~2 min,
          # leaving the visual-service commands unregistered ("checkScreen is
          # not a function"). Suspected interaction between WebKitWebDriver +
          # the patched-execute wrapping; needs an upstream investigation.
          - { os: ubuntu-latest, test-type: visual }
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri
      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsoup-3.0-dev libssl-dev libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev xvfb webkit2gtk-driver
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      - name: Run Tauri official tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          NO_AT_BRIDGE: '1'
          RUST_BACKTRACE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x16" pnpm run test:tauri:official:${{ matrix.test-type }}
      - name: Run Tauri official tests
        if: ${{ runner.os == 'Windows' }}
        env:
          RUST_BACKTRACE: '1'
        run: pnpm run test:tauri:official:${{ matrix.test-type }}
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/tauri run ci:logs

  # ────────────────────────────────────────────────────────────────────
  # Tauri CrabNebula — all OS × test types
  # macOS requires CN_API_KEY (must be configured as a repo secret)
  # ────────────────────────────────────────────────────────────────────
  tauri-crabnebula:
    name: tauri-crabnebula-${{ matrix.test-type }} (${{ matrix.os }}, ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]
        test-type: [standard, multiremote, deeplink, standalone, window, visual, video]
        exclude:
          # CrabNebula's macOS driver captures via OS-level Screen Recording
          # (AVFoundation / ScreenCaptureKit). GitHub-hosted macOS runners
          # have no way to grant Screen Recording permission to the runner
          # process programmatically, so visual tests time out / error.
          # Local macOS works (one-time prompt). Document this limitation.
          - { os: macos-latest, test-type: visual }
          # `wdio-video-reporter` captures via per-command screenshots, which
          # on CrabNebula+macOS go through the same Screen Recording path as
          # the visual cell — same TCC permission limitation applies.
          - { os: macos-latest, test-type: video }
      fail-fast: false

    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri
      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libsoup-3.0-dev libssl-dev libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev xvfb webkit2gtk-driver
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      - name: Run Tauri CrabNebula tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          NO_AT_BRIDGE: '1'
          RUST_BACKTRACE: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x16" pnpm run test:tauri:crabnebula:${{ matrix.test-type }}
      - name: Run Tauri CrabNebula tests
        if: ${{ runner.os != 'Linux' }}
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          RUST_BACKTRACE: '1'
        run: pnpm run test:tauri:crabnebula:${{ matrix.test-type }}
      - name: 🐛 Show Test Logs on Failure
        shell: bash
        if: failure()
        run: pnpm --filter=@wdio-desktop-mobile-example/tauri run ci:logs

  # ────────────────────────────────────────────────────────────────────
  # React Native (mobile, Appium-driven) — per platform, not per provider.
  #
  # Unlike the desktop services, the service doesn't spawn the app: @wdio/appium-service boots
  # Appium, Appium installs + launches the native artifact, and the service attaches to the app's
  # Hermes realm over Metro for execute/mock. Each job builds the fixture once, then runs all three
  # mobile test types (standard, deeplink, contexts) sequentially against one device.
  #
  # Gated off the `minimum` catalog: the service requires webdriverio 9 + Node 22, which the
  # wdio-8-based minimum catalog can't satisfy. Node is 22.x here (the rest of the matrix is 20.x)
  # because the service engine is >=22.12 and the WDIO config uses fs.globSync (Node 22+).
  # ────────────────────────────────────────────────────────────────────
  react-native-android:
    name: react-native-android (${{ matrix.os }}, ${{ matrix.node-version }})
    if: ${{ inputs.catalog != 'minimum' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x]
      fail-fast: false
    env:
      # Scaffolded RN project (native android/ + JS). The package's .gitignore ignores it; the WDIO
      # config globs the APK here when RN_APP_PATH is unset, and Metro is served from it.
      RN_BUILD_DIR: ${{ github.workspace }}/packages/react-native/.rn-build
      RN_PLATFORM: android
    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      # Reclaim disk for the Android SDK/emulator/gradle footprint.
      - name: 🧹 Free Disk Space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift || true
          sudo rm -rf /usr/local/share/powershell /usr/local/share/boost /usr/local/graalvm || true
          sudo docker image prune --all --force || true
      # KVM acceleration for the x86_64 emulator.
      - name: ⚡ Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      # RN 0.76 targets JDK 17 (+ Gradle 8.x).
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      # Scaffold a fresh RN project (native android/ is generated, not committed) and overlay the
      # committed fixture source, then build the debug APK (debug is mandatory — the Hermes inspector
      # execute/mock attach to is debug-only). Build with the New Architecture (Fabric), the RN 0.76
      # default and what users get — the view tree / Hermes inspector register a little later than
      # Paper, absorbed by the 90s app-ready `before` gate.
      - name: 🏗️ Scaffold native project + build debug APK
        shell: bash
        run: |
          set -euo pipefail
          # Single-source the RN + CLI versions from app/package.json (same as build-app.mjs) so a
          # version bump only touches one file.
          RN_APP_PKG="$GITHUB_WORKSPACE/packages/react-native/app/package.json"
          RN_VERSION=$(node -p "require('$RN_APP_PKG').dependencies['react-native']")
          RN_CLI=$(node -p "require('$RN_APP_PKG').devDependencies['@react-native-community/cli']")
          npx --yes "@react-native-community/cli@$RN_CLI" init ReactNativeE2EApp \
            --version "$RN_VERSION" --directory "$RN_BUILD_DIR" --skip-git-init --pm npm --install-pods false
          for f in App.tsx index.js app.json metro.config.js babel.config.js; do
            cp "packages/react-native/app/$f" "$RN_BUILD_DIR/$f"
          done
          sed -i "s/^newArchEnabled=.*/newArchEnabled=true/" "$RN_BUILD_DIR/android/gradle.properties"
          grep '^newArchEnabled=' "$RN_BUILD_DIR/android/gradle.properties"
          ( cd "$RN_BUILD_DIR/android" && ./gradlew assembleDebug --no-daemon -PreactNativeArchitectures=x86_64 )
          echo "RN_APP_PATH=$RN_BUILD_DIR/android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"
      # Idempotent: appium exits 1 if the driver is already registered in APPIUM_HOME.
      - name: 🔌 Install Appium UiAutomator2 driver
        shell: bash
        run: |
          set -euo pipefail
          if pnpm --filter=@wdio-desktop-mobile-example/react-native exec appium driver list --installed 2>&1 | grep -qi uiautomator2; then
            echo "uiautomator2 driver already installed"
          else
            pnpm --filter=@wdio-desktop-mobile-example/react-native exec appium driver install uiautomator2
          fi
      - name: 🤖 Run E2E on Android emulator
        # Third-party action → pinned to a full commit SHA (this job has secret access via inherit).
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # android-emulator-runner runs this with dash (no pipefail) → use POSIX-safe `set -eu`.
          script: |
            set -eu
            # Map emulator:8081 → host:8081 so the debug bundle load and the Hermes inspector attach
            # both reach Metro on the runner host.
            adb reverse tcp:8081 tcp:8081
            ( cd "$RN_BUILD_DIR" && npx react-native start --port 8081 > "$GITHUB_WORKSPACE/packages/react-native/metro.log" 2>&1 & )
            pnpm --filter=@wdio-desktop-mobile-example/react-native exec wait-on tcp:8081 --timeout 120000
            # Run wdio directly (like the upstream e2e suite), NOT via the root turbo scripts —
            # Turbo's task wrapper interferes with the long-lived Appium server + emulator session.
            # deeplink is intentionally NOT run in CI (mirrors upstream): the fixture registers no
            # URL scheme, so triggerDeeplink's am-start fallback can't resolve. Kept for manual runs.
            pnpm --filter=@wdio-desktop-mobile-example/react-native run test
            pnpm --filter=@wdio-desktop-mobile-example/react-native run test:contexts
      - name: 🐛 Show Metro log on failure
        if: failure()
        shell: bash
        run: tail -n 200 packages/react-native/metro.log || true
      - name: 🐛 Show Test Logs on Failure
        if: failure()
        shell: bash
        run: pnpm --filter=@wdio-desktop-mobile-example/react-native run ci:logs

  react-native-ios:
    name: react-native-ios (${{ matrix.os }}, ${{ matrix.node-version }})
    if: ${{ inputs.catalog != 'minimum' }}
    runs-on: ${{ matrix.os }}
    # Cap a hung Appium/WDA session (a stuck session-create can otherwise idle the macOS runner).
    timeout-minutes: 75
    strategy:
      matrix:
        # Pinned to macos-15 (Xcode 16 + iOS 18 simulators) rather than macos-latest: on the
        # bleeding-edge macos-26 / iOS 26 image, appium-xcuitest hits the #359 "unknown to
        # FrontBoard" app-launch flake consistently. iOS 18 is well-supported by appium-xcuitest 11.x.
        os: [macos-15]
        node-version: [22.x]
      fail-fast: false
    env:
      RN_BUILD_DIR: ${{ github.workspace }}/packages/react-native/.rn-build
      RN_PLATFORM: ios
      RN_IOS_DEVICE: 'iPhone 16'
    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      # Scaffold, install pods (New Architecture / Fabric — the RN 0.76 default), and build the
      # simulator .app once. Debug build is mandatory (Hermes inspector). Unlike upstream we keep
      # build + e2e in one job and let appium
      # compile WebDriverAgent on the first session — the WDIO config's generous wdaLaunchTimeout /
      # connectionRetryTimeout (when RN_WDA_DD is unset) absorb that, trading speed for fewer moving
      # parts than the prebuilt-WDA artifact dance.
      - name: 📱 Build iOS simulator app
        shell: bash
        run: |
          set -euo pipefail
          # Single-source the RN + CLI versions from app/package.json (same as build-app.mjs) so a
          # version bump only touches one file.
          RN_APP_PKG="$GITHUB_WORKSPACE/packages/react-native/app/package.json"
          RN_VERSION=$(node -p "require('$RN_APP_PKG').dependencies['react-native']")
          RN_CLI=$(node -p "require('$RN_APP_PKG').devDependencies['@react-native-community/cli']")
          npx --yes "@react-native-community/cli@$RN_CLI" init ReactNativeE2EApp \
            --version "$RN_VERSION" --directory "$RN_BUILD_DIR" --skip-git-init --pm npm --install-pods false
          for f in App.tsx index.js app.json metro.config.js babel.config.js; do
            cp "packages/react-native/app/$f" "$RN_BUILD_DIR/$f"
          done
          ( cd "$RN_BUILD_DIR/ios" && RCT_NEW_ARCH_ENABLED=1 pod install )
          ( cd "$RN_BUILD_DIR/ios" && xcodebuild \
              -workspace ReactNativeE2EApp.xcworkspace \
              -scheme ReactNativeE2EApp \
              -configuration Debug \
              -sdk iphonesimulator \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO 2>&1 | (xcbeautify || cat) )
          APP_PATH="$RN_BUILD_DIR/ios/build/Build/Products/Debug-iphonesimulator/ReactNativeE2EApp.app"
          test -d "$APP_PATH" || { echo "::error::iOS .app not found at $APP_PATH"; exit 1; }
          echo "RN_APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
      # Warm the toolchain so appium-xcuitest's in-session `xcrun --show-sdk-version` probe is instant.
      - name: 🔥 Warm Xcode toolchain
        shell: bash
        run: |
          set -euo pipefail
          xcrun --sdk iphonesimulator --show-sdk-version
          xcrun simctl list devices available >/dev/null
      # Resolve + boot a concrete UDID and pin appium:udid to it (RN_IOS_UDID) so appium can't boot a
      # different same-named instance — the proven first-session flake.
      - name: 📲 Boot iOS simulator
        shell: bash
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available --json \
            | jq -r --arg name "$RN_IOS_DEVICE" \
                'first(.devices | to_entries | sort_by(.key) | reverse | .[].value[] | select(.name == $name) | .udid) // empty')
          test -n "$UDID" || { echo "::error::No available simulator named '$RN_IOS_DEVICE'"; xcrun simctl list devices available; exit 1; }
          echo "RN_IOS_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" 2>/tmp/boot.err || grep -qiE "already booted|current state: Booted" /tmp/boot.err
          xcrun simctl bootstatus "$UDID" -b
      - name: 🔌 Install Appium XCUITest driver
        shell: bash
        run: |
          set -euo pipefail
          if pnpm --filter=@wdio-desktop-mobile-example/react-native exec appium driver list --installed 2>&1 | grep -qi xcuitest; then
            echo "xcuitest driver already installed"
          else
            pnpm --filter=@wdio-desktop-mobile-example/react-native exec appium driver install xcuitest
          fi
      - name: 🧪 Run E2E on iOS simulator
        shell: bash
        run: |
          set -euo pipefail
          # Metro serves the JS bundle + Hermes inspector; the simulator reaches it over the shared
          # host loopback (no adb-reverse equivalent needed on iOS).
          ( cd "$RN_BUILD_DIR" && npx react-native start --port 8081 > "$GITHUB_WORKSPACE/packages/react-native/metro.log" 2>&1 & )
          pnpm --filter=@wdio-desktop-mobile-example/react-native exec wait-on tcp:8081 --timeout 120000
          # Pre-bundle: Metro compiles lazily on first request (~60s cold); force it now so the first
          # app launch doesn't land on the "Bundling…" overlay with an empty tree.
          curl -fsS --max-time 300 "http://localhost:8081/index.bundle?platform=ios&dev=true&minify=false" -o /dev/null \
            && echo "Metro bundle pre-built" || echo "::warning::Metro pre-bundle request failed (continuing)"
          # Run wdio directly (like the upstream e2e suite), NOT via the root turbo scripts.
          # deeplink is intentionally NOT run in CI (mirrors upstream): the fixture registers no URL
          # scheme, so triggerDeeplink can't resolve. Kept for manual runs.
          pnpm --filter=@wdio-desktop-mobile-example/react-native run test
          pnpm --filter=@wdio-desktop-mobile-example/react-native run test:contexts
      - name: 🐛 Show Metro log on failure
        if: failure()
        shell: bash
        run: tail -n 200 packages/react-native/metro.log || true
      - name: 🐛 Show Test Logs on Failure
        if: failure()
        shell: bash
        run: pnpm --filter=@wdio-desktop-mobile-example/react-native run ci:logs

  # ────────────────────────────────────────────────────────────────────
  # Flutter (mobile, Appium-driven via appium-flutter-driver). Like React Native, Appium owns the
  # session — but a Flutter debug build is self-contained: no Metro / JS-bundle server, no
  # adb-reverse. Find/tap runs over appium-flutter-driver's FLUTTER context.
  #
  # The Dart-side `wdio_flutter` contract (execute/mock/emitEvent) is not yet on pub.dev, so the
  # fixture is stripped to the backend-independent surface and those specs are excluded from the wdio
  # configs. Only find/tap (standard) + contexts run here. When wdio_flutter publishes, re-enable the
  # deferred specs — the Android leg then also needs the appium-flutter-driver getVMServiceUrl fork.
  #
  # Gated off the `minimum` catalog (the service needs webdriverio 9 + Node 22). Node is 22.x (the
  # rest of the matrix is 20.x); the Flutter SDK is pinned to 3.35.6.
  # ────────────────────────────────────────────────────────────────────
  flutter-android:
    name: flutter-android (${{ matrix.os }}, ${{ matrix.node-version }})
    if: ${{ inputs.catalog != 'minimum' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x]
      fail-fast: false
    env:
      # Scaffolded Flutter project (native android/ + Dart). The package's .gitignore ignores it; the
      # WDIO config globs the APK here when FLUTTER_APP_PATH is unset.
      FLUTTER_BUILD_DIR: ${{ github.workspace }}/packages/flutter/.flutter-build
      FLUTTER_PLATFORM: android
    steps:
      - name: Fix git checkout line endings
        run: git config --global core.autocrlf input
      # Reclaim disk for the Android SDK/emulator/gradle + Flutter SDK footprint. Keep
      # /usr/local/lib/android — this job needs the Android SDK.
      - name: 🧹 Free Disk Space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift || true
          sudo rm -rf /usr/local/share/powershell /usr/local/share/boost /usr/local/graalvm || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
      - name: ⚡ Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      # Flutter 3.35 targets JDK 17 (Gradle 8.x) for the Android build.
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      # Third-party action → pinned to a full commit SHA (matches the android-emulator-runner pin).
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.35.6'
          channel: stable
          cache: true
      - name: Cache pnpm modules
        uses: actions/cache@v5
        env:
          cache-name: cache-pnpm-modules
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-${{ matrix.node-version }}-${{ inputs.catalog }}-
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Install dependencies (frozen)
        if: ${{ inputs.catalog == 'default' && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        run: pnpm install --frozen-lockfile
      - name: Install dependencies (refresh latest)
        if: ${{ inputs.catalog == 'default' && github.event_name != 'push' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile
      - name: Switch to ${{ inputs.catalog }} catalog
        if: ${{ inputs.catalog != 'default' }}
        shell: bash
        run: pnpm dlx tsx scripts/switch-catalog.ts ${{ inputs.catalog }}
      # Scaffold the Android platform project over the committed source-only fixture, overlay our
      # lib/main.dart + pubspec.yaml (flutter create can overwrite them), and build a debug APK
      # (--target-platform android-x64 for the x86_64 emulator). Strip ndkVersion so Gradle doesn't
      # auto-download the ~1GB NDK (the fixture has no native code). A debug build is what the
      # (deferred) execute/mock specs will need — the Dart VM Service is debug-only.
      - name: 🏗️ Scaffold + build debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/packages/flutter"
          flutter create --org com.wdio --project-name wdio_flutter_fixture --platforms=android "$FLUTTER_BUILD_DIR"
          cp app/lib/main.dart "$FLUTTER_BUILD_DIR/lib/main.dart"
          cp app/pubspec.yaml "$FLUTTER_BUILD_DIR/pubspec.yaml"
          find "$FLUTTER_BUILD_DIR/android" -name 'build.gradle*' -exec sed -i '/ndkVersion/d' {} +
          ( cd "$FLUTTER_BUILD_DIR" && flutter pub get && flutter build apk --debug --target-platform android-x64 )
          echo "FLUTTER_APP_PATH=$FLUTTER_BUILD_DIR/build/app/outputs/flutter-apk/app-debug.apk" >> "$GITHUB_ENV"
      # appium-flutter-driver is a meta-driver — it bundles uiautomator2/xcuitest. Idempotent: appium
      # exits 1 if the driver is already registered in APPIUM_HOME.
      - name: 🔌 Install Appium Flutter driver
        shell: bash
        run: |
          set -euo pipefail
          if pnpm --filter=@wdio-desktop-mobile-example/flutter exec appium driver list --installed 2>&1 | grep -qi flutter; then
            echo "flutter driver already installed"
          else
            pnpm --filter=@wdio-desktop-mobile-example/flutter exec appium driver install --source=npm appium-flutter-driver
          fi
      - name: 🤖 Run E2E on Android emulator
        # Third-party action → pinned to a full commit SHA, not a floating tag.
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # android-emulator-runner runs this with dash (no pipefail) → POSIX-safe `set -eu`.
          script: |
            set -eu
            # Flutter debug builds are self-contained (no Metro / adb-reverse needed). Run only the
            # backend-independent test types — execute/mock/emitEvent/logging are excluded from the
            # wdio configs until wdio_flutter publishes. deeplink is NOT run in CI (mirrors RN): the
            # fixture registers no URL scheme.
            pnpm --filter=@wdio-desktop-mobile-example/flutter run test
            pnpm --filter=@wdio-desktop-mobile-example/flutter run test:contexts
      - name: 🐛 Show Test Logs on Failure
        if: failure()
        shell: bash
        run: pnpm --filter=@wdio-desktop-mobile-example/flutter run ci:logs

